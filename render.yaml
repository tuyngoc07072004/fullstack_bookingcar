services:
  # ============================================
  # Backend - Node.js Express (Docker)
  # ============================================
  - type: web
    name: car-booking-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URL_SHIP
        value: http://localhost:3001

  - type: web
    name: car-booking-custom
    env: docker
    dockerContext: .
    dockerfilePath: custom/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: VITE_API_URL
        sync: false

  # ============================================
  # Driver Frontend (Docker)
  # ============================================
  - type: web
    name: car-booking-driver
    env: docker
    dockerContext: .
    dockerfilePath: driver/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: VITE_API_URL
        sync: false

  - type: web
    name: car-booking-staff
    env: docker
    dockerContext: .
    dockerfilePath: staff/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: VITE_API_URL
        sync: false